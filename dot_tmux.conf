set-option -g default-shell "$SHELL"

# Ergonomics and quality-of-life.
set-option -g history-limit 100000
set-option -g mouse on
set-option -g focus-events on
set-option -g renumber-windows on
set-option -g set-clipboard on
set-option -g allow-rename off
set-option -g set-titles on
set-option -g set-titles-string "#{session_name}:#{window_name}"
set-option -sg escape-time 0

# Terminal defaults with truecolor support.
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Helps Meta/arrow sequences in xterm-compatible terminals (iTerm2, Kitty, Ghostty).
# Enables Option-based bindings below when the GUI app sends Esc-prefixed keys.
set-option -gw xterm-keys on

# Use vi-style keys in copy mode.
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Clipboard integration.
if-shell "command -v pbcopy >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel"

if-shell "command -v pbpaste >/dev/null 2>&1" \
  "bind-key P run-shell 'tmux set-buffer -- \"$(pbpaste)\"; tmux paste-buffer'"

if-shell "command -v pbcopy >/dev/null 2>&1" \
  "bind-key Y run-shell 'tmux save-buffer - | pbcopy'"

# Rebind pane splits to keep current working directory.
unbind '"'
unbind %
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Quick config reload and scrollback clear.
bind-key r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind-key b send-keys -R \; clear-history
bind-key s choose-tree -sZ
bind-key w choose-tree -wZ

# Vim-aware pane switching (no prefix; -n).
#
# macOS / terminal conflicts:
#   • C-h — often ASCII backspace before tmux sees it (classic tty behavior).
#   • C-j — newline in several stacks.
#   • C-l — Bash/zsh Emacs mode "clear screen" (readline); steals from tmux if the
#           shell consumes the keystroke first (focus must be tmux pane, not popup).
#   • Default tmux prefix is C-b — same as readline backward-char (Emacs editing).
#
# Outside Neovim/vim the run-shell passes keys through only when grep matches; otherwise
# tmux handles pane nav. When keys still disappear, try iTerm/Ghostty "Report modifiers
# using CSI u" style options, disable Secure Keyboard Entry while testing, or rely on
# prefix + hjkl instead of bare C-hjkl.
#
# Vim-aware pane switching.
bind -n C-h run-shell "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)g?(view|n?vim(diff)?)$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run-shell "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)g?(view|n?vim(diff)?)$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run-shell "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)g?(view|n?vim(diff)?)$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run-shell "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)g?(view|n?vim(diff)?)$' && tmux send-keys C-l) || tmux select-pane -R"
bind -n C-\\ run-shell "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|/)g?(view|n?vim(diff)?)$' && tmux send-keys C-\\\\) || tmux select-pane -l"

# Prefix pane movement and pane resizing (tmux default prefix is usually C-b).
#
# Resize defaults: Shift+HJKL — on macOS, IME / accessibility / some host shortcuts can
# eat chorded Shift keys before tmux receives them.
#
# Alternatives (same repeat-time): prefix + Ctrl+h/j/k/l resize by 5 cells (no Shift).
# Alternative: prefix + Alt/Option+h/j/k/l — works when the GUI terminal maps Option to
# Meta + key (iTerm: Keys → Left Option → Esc+; Kitty: macos_option_as_alt).
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5
bind-key -r M-h resize-pane -L 5
bind-key -r M-j resize-pane -D 5
bind-key -r M-k resize-pane -U 5
bind-key -r M-l resize-pane -R 5

# Auto-tile panes after split/close/resize.
set-hook -g after-split-window "select-layout tiled"
set-hook -g after-kill-pane "select-layout tiled"
set-hook -g client-resized "select-layout tiled"
bind-key t select-layout tiled

# Lightweight, readable status bar.
set-option -g status-interval 5
set-option -g status-style "bg=colour235,fg=colour250"
set-option -g message-style "bg=colour24,fg=colour231"
set-option -g pane-border-style "fg=colour239"
set-option -g pane-active-border-style "fg=colour39"
set-option -g status-left-length 40
set-option -g status-right-length 80
set-option -g status-left "#[fg=colour81,bold]#S #[fg=colour244]| #[fg=colour250]#(whoami)"
set-option -g status-right "#[fg=colour244]%Y-%m-%d #[fg=colour250]%H:%M #[fg=colour244]| #[fg=colour39]#H"

setw -g window-status-format " #[fg=colour244]#I #[fg=colour250]#W "
setw -g window-status-current-format " #[fg=colour16,bg=colour39,bold]#I:#W#[default] "

# TPM plugin stack: sensible defaults + session/window tools.
set-option -g @plugin "tmux-plugins/tpm"
set-option -g @plugin "tmux-plugins/tmux-sensible"
set-option -g @plugin "tmux-plugins/tmux-resurrect"
set-option -g @plugin "tmux-plugins/tmux-continuum"
set-option -g @plugin "sainnhe/tmux-fzf"

# Persist and restore sessions/window/pane state automatically.
set-option -g @continuum-restore "on"
set-option -g @continuum-save-interval "10"
set-option -g @resurrect-capture-pane-contents "on"

# Install plugins with: prefix + I
run "~/.tmux/plugins/tpm/tpm"
